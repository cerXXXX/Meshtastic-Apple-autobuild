schemes:
  Meshtastic:
    build:
      targets:
        Meshtastic: all
    run:
      config: Debug
      environmentVariables:
        - variable: "IDELogRedirectionPolicy"
          value: "oslogToStdio"
          isEnabled: true
        - variable: "PUBLIC_MQTT_USERNAME"
          value: "meshdev"
          isEnabled: true
        - variable: "PUBLIC_MQTT_PASSWORD"
          value: "large4cats"
          isEnabled: true
        - variable: "TRANSLATIONS_GITHUB_TOKEN"
          value: ""
          isEnabled: true
    test:
      config: Debug
      targets:
        - MeshtasticTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  "Meshtastic (Background BLE)":
    build:
      targets:
        Meshtastic: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  WidgetsExtension:
    build:
      targets:
        WidgetsExtension: all
        Meshtastic: all
    run:
      config: Debug
      executable: Meshtastic
      environmentVariables:
        - variable: "_XCWidgetKind"
          value: ""
          isEnabled: true
        - variable: "_XCWidgetDefaultView"
          value: "timeline"
          isEnabled: true
        - variable: "_XCWidgetFamily"
          value: "systemMedium"
          isEnabled: true
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

